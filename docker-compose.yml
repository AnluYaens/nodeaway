version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      N8N_API_URL: ${N8N_API_URL:-http://localhost:5678}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/autopilot.db}
    volumes:
      - db-data:/app/data

volumes:
  db-data:
