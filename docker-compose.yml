version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      N8N_API_URL: ${N8N_API_URL:-http://localhost:5678}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/autopilot.db}
    volumes:
      - db-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:
